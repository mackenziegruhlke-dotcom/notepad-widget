<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes</title>

<style>
  html, body {
    margin: 0;
    padding: 0;

    /* IMPORTANT: allow natural document flow */
    height: auto;
    overflow-x: hidden;
  }

  :root {
    --handwriting: "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;
    --line: 26px;
  }

  .pad {
    position: relative;
    width: 100%;

    /* NO vh, NO fixed height */
    min-height: 100vh;

    padding: 26px 20px 40px 56px;
    box-sizing: border-box;

    background-color: #f7f1c6;

    background-image:
      repeating-linear-gradient(
        to bottom,
        transparent,
        transparent calc(var(--line) - 1px),
        rgba(60, 120, 200, 0.35) var(--line)
      );

    font-family: var(--handwriting);
    font-size: 18px;
    line-height: var(--line);

    color: rgba(0,0,0,0.85);
  }

  .pad::before {
    content: "";
    position: absolute;
    left: 52px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(200, 60, 60, 0.25);
  }

  .editor {
    width: 100%;
    min-height: 100%;

    outline: none;
    border: none;

    font-family: var(--handwriting);
    font-size: 18px;
    line-height: var(--line);

    white-space: pre-wrap;
    word-wrap: break-word;
  }
</style>
</head>

<body>
  <div class="pad">
    <div class="editor" contenteditable="true" spellcheck="false">notes</div>
  </div>
</body>
</html>
