<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  :root {
    --handwriting: "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;
    --line: 26px;
  }

  .pad {
    position: relative;
    min-height: 100vh;
    width: 100%;

    padding: calc(var(--line) * 1) 20px 22px 56px;

    background-color: #f7f1c6;

    background-image:
      repeating-linear-gradient(
        to bottom,
        transparent,
        transparent var(--line),
        rgba(60, 120, 200, 0.35) calc(var(--line) + 1px)
      );

    font-family: var(--handwriting);
    font-size: 18px;
    line-height: var(--line);

    box-sizing: border-box;
    color: rgba(0,0,0,0.85);
  }

  .pad::before {
    content: "";
    position: absolute;
    left: 52px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(200, 60, 60, 0.25);
  }

  textarea {
    width: 100%;
    height: 100vh;
    border: none;
    outline: none;
    background: transparent;
    resize: none;

    font-family: var(--handwriting);
    font-size: 18px;
    line-height: var(--line);

    color: inherit;
    text-transform: none;
    letter-spacing: normal;
  }

  /* 👇 ONLY CHANGE */
  .pad::placeholder {
    text-transform: lowercase;
  }
</style>
</head>

<body>
  <div class="pad">
    <textarea placeholder="notes"></textarea>
  </div>
</body>
</html>
