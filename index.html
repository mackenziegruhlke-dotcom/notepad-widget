<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: auto;
  }

  :root {
    --handwriting: "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;
    --line: 26px;
  }

  body {
    overflow: hidden; /* prevents page scroll bars */
  }

  .pad {
    position: relative;
    width: 100%;

    /* key change: allow natural expansion instead of fixed viewport height */
    min-height: 100vh;

    padding: 26px 20px 40px 56px;

    background-color: #f7f1c6;

    background-image:
      repeating-linear-gradient(
        to bottom,
        transparent,
        transparent calc(var(--line) - 1px),
        rgba(60, 120, 200, 0.35) var(--line)
      );

    font-family: var(--handwriting);
    font-size: 18px;
    line-height: var(--line);

    box-sizing: border-box;
    color: rgba(0,0,0,0.85);
  }

  .pad::before {
    content: "";
    position: absolute;
    left: 52px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(200, 60, 60, 0.25);
  }

  textarea {
    width: 100%;

    /* 🔥 KEY FIX: removes internal scroll behavior */
    height: auto;
    min-height: calc(100vh - 60px);

    border: none;
    outline: none;
    background: transparent;
    resize: none;

    font-family: var(--handwriting);
    font-size: 18px;
    line-height: var(--line);

    color: inherit;

    text-transform: none;
    letter-spacing: normal;

    overflow: hidden; /* removes scrollbar inside textarea */
  }
</style>
</head>

<body>
  <div class="pad">
    <textarea placeholder="notes"></textarea>
  </div>
</body>
</html>
