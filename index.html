<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  :root {
    --handwriting: "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;
    --line: 26px;
  }

  .pad {
    position: relative;
    width: 100%;
    height: calc(100vh - 6px);
    box-sizing: border-box;

    padding: 26px 20px 40px 56px;

    background-color: #f7f1c6;

    background-image:
      repeating-linear-gradient(
        to bottom,
        transparent,
        transparent calc(var(--line) - 1px),
        rgba(60, 120, 200, 0.35) var(--line)
      );

    font-family: var(--handwriting);
    font-size: 18px;
    line-height: var(--line);

    color: rgba(0,0,0,0.85);
  }

  .pad::before {
    content: "";
    position: absolute;
    left: 52px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(200, 60, 60, 0.25);
  }

  textarea {
    width: 100%;
    min-height: calc(100vh - 60px);

    border: none;
    outline: none;
    background: transparent;
    resize: none;

    font-family: var(--handwriting);
    font-size: 18px;
    line-height: var(--line);

    color: inherit;
    text-transform: none;
    letter-spacing: normal;

    overflow: hidden;
    box-sizing: border-box;
  }
</style>
</head>

<body>

<div class="pad">
  <textarea id="notes" placeholder="notes"></textarea>
</div>

<script>
const textarea = document.getElementById("notes");
const STORAGE_KEY = "legalPadNotes";

// Load saved notes
const saved = localStorage.getItem(STORAGE_KEY);
if (saved !== null) {
  textarea.value = saved;
}

// Save automatically whenever you type
textarea.addEventListener("input", () => {
  localStorage.setItem(STORAGE_KEY, textarea.value);
});
</script>

</body>
</html>
