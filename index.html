<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  :root {
    --handwriting: "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;
    --line: 26px;
  }

  .pad {
    position: relative;
    width: 100%;
    height: calc(100vh - 6px);
    box-sizing: border-box;

    padding: 26px 20px 40px 56px;

    background-color: #f7f1c6;

    background-image:
      repeating-linear-gradient(
        to bottom,
        transparent,
        transparent calc(var(--line) - 1px),
        rgba(60, 120, 200, 0.35) var(--line)
      );

    font-family: var(--handwriting);
    font-size: 18px;
    line-height: var(--line);

    color: rgba(0,0,0,0.85);
  }

  /* red margin line */
  .pad::before {
    content: "";
    position: absolute;
    left: 52px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(200, 60, 60, 0.25);
  }

  .editor {
    width: 100%;
    height: 100%;
    outline: none;
    border: none;

    font-family: var(--handwriting);
    font-size: 18px;
    line-height: var(--line);

    white-space: pre-wrap;
    word-wrap: break-word;

    position: relative;
    z-index: 2;
  }

  /* placeholder overlay */
  .placeholder {
    position: absolute;
    top: 26px;
    left: 56px;
    right: 20px;

    font-family: var(--handwriting);
    font-size: 18px;
    line-height: var(--line);

    color: rgba(0,0,0,0.35);
    pointer-events: none;

    z-index: 1;
  }

  .hidden {
    display: none;
  }
</style>
</head>

<body>
  <div class="pad">
    <div class="placeholder" id="placeholder">notes</div>

    <div class="editor"
         id="editor"
         contenteditable="true"
         spellcheck="false"></div>
  </div>

<script>
  const editor = document.getElementById("editor");
  const placeholder = document.getElementById("placeholder");

  function updatePlaceholder() {
    if (editor.textContent.trim().length === 0) {
      placeholder.classList.remove("hidden");
    } else {
      placeholder.classList.add("hidden");
    }
  }

  editor.addEventListener("input", updatePlaceholder);
  updatePlaceholder();
</script>

</body>
</html>
